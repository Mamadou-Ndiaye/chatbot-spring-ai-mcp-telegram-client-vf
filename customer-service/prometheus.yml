global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'customer-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8056']   # ou 'host.docker.internal:8081' si port différent
        labels:
          application: 'customer-service'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']